# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g default-shell /bin/zsh
set -g default-command "zsh"

# reload config file
bind r source-file ~/.tmux.conf

# Start windows and panes at 1, not 0
set -g base-index 1

# Key bindings
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# renumber windows automatically
# ex I have windows 1, 2, 3 and close 2 - I now have 1, 2 instead of 1, 3
set -g renumber-windows on

# split panes using | and - and open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# VI mode for tmux-yank (copy paste)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Cursor shape: vertical bar (line) instead of block
set -g cursor-style blinking-bar

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

# Sesh session switcher — replaces the default prefix+s tree view
bind s display-popup -E -w 40% -h 50% "sesh connect \"$(sesh list -i | fzf --no-sort --ansi --layout=reverse --height=100% --prompt '⚡  ' --bind 'ctrl-x:execute(tmux kill-session -t {2})+reload(sesh list -i)')\""

# ---------------------------------------------------------------------------
# Status bar — Kanagawa Wave theme
#
# Kanagawa Wave palette used:
#   bg        #1F1F28   surface   #2A2A37   surface+  #363646
#   fg        #DCD7BA   dim       #727169
#   app       #E46876   cpu       #E6C384   session   #98BB6C
#   uptime    #7E9CD8   battery   #957FB8
# ---------------------------------------------------------------------------

set -g status-style "bg=#1F1F28,fg=#DCD7BA"
set -g message-style "bg=#2A2A37,fg=#DCD7BA"
set -g status-left-length 0
set -g status-right-length 120
set -g status-left ""

# Window tabs — rectangular blocks, gap between each is the bare status bg
set -g window-status-separator "#[bg=#1F1F28] "
set -g window-status-format         "#[fg=#727169,bg=#2A2A37] #I  #W#{?window_zoomed_flag, 󰁌 ,} "
set -g window-status-current-format "#[fg=#DCD7BA,bg=#363646,bold] #I  #W#{?window_zoomed_flag, 󰁌 ,} "

# Pane borders
set -g pane-border-style        "fg=#2A2A37"
set -g pane-active-border-style "fg=#7FB4CA"

# Right status — each module: icon + value on #2A2A37, separated by a gap
# Gap between modules: single space at status bg colour (#1F1F28)
set -g  status-right "#[fg=#E46876,bg=#2A2A37]  #{pane_current_command} "
set -ag status-right "#[fg=#1F1F28,bg=#1F1F28] "
set -ag status-right "#[fg=#E6C384,bg=#2A2A37]  #{cpu_percentage} "
set -ag status-right "#[fg=#1F1F28,bg=#1F1F28] "
set -ag status-right "#[fg=#98BB6C,bg=#2A2A37]#{?client_prefix,#[fg=#E46876],}  #S "
set -ag status-right "#[fg=#1F1F28,bg=#1F1F28] "
set -ag status-right "#[fg=#7E9CD8,bg=#2A2A37] 󰔟 #(uptime | sed 's/^[^,]*up *//; s/, *[[:digit:]]* user.*//; s/ day.*, */d /; s/ hr\\(s*\\).*/h/; s/ min\\(s*\\).*/m/; s/ sec\\(s*\\).*/s/; s/\\([0-9]\\{1,2\\}\\):\\([0-9]\\{1,2\\}\\)/\\1h \\2m/') "
set -ag status-right "#[fg=#1F1F28,bg=#1F1F28] "
set -ag status-right "#[fg=#957FB8,bg=#2A2A37] #{battery_icon} #{battery_percentage} "

# Battery icons — Nerd Font glyphs to match the rest of the status bar
set -g @batt_icon_status_charging    '󰂄'
set -g @batt_icon_status_charged     '󰁹'
set -g @batt_icon_status_discharging '󰁹'
set -g @batt_icon_status_unknown     '󰂑'
set -g @batt_icon_status_attached    '󰂄'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
