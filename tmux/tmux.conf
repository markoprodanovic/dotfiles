# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g default-shell /bin/zsh
set -g default-command "zsh"

# reload config file
bind r source-file ~/.tmux.conf

# Start windows and panes at 1, not 0
set -g base-index 1

# Key bindings
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# renumber windows automatically
# ex I have windows 1, 2, 3 and close 2 - I now have 1, 2 instead of 1, 3
set -g renumber-windows on

# split panes using | and - and open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# VI mode for tmux-yank (copy paste)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Cursor shape: vertical bar (line) instead of block
set -g cursor-style blinking-bar

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

# Sesh session switcher — replaces the default prefix+s tree view
bind s display-popup -E -w 40% -h 50% "sesh connect \"$(sesh list -i | fzf --no-sort --ansi --layout=reverse --height=100% --prompt '⚡  ' --bind 'ctrl-x:execute(tmux kill-session -t {2})+reload(sesh list -i)')\""

# ---------------------------------------------------------------------------
# Status bar — custom TokyoNight Night-matched theme
#
# TokyoNight Night palette used:
#   bg        #1a1b26   surface   #24283b   surface+  #292e42
#   fg        #c0caf5   dim       #565f89
#   app       #f7768e   cpu       #e0af68   session   #9ece6a
#   uptime    #7aa2f7   battery   #bb9af7
# ---------------------------------------------------------------------------

set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g message-style "bg=#24283b,fg=#c0caf5"
set -g status-left-length 0
set -g status-right-length 120
set -g status-left ""

# Window tabs — rectangular blocks, gap between each is the bare status bg
set -g window-status-separator "#[bg=#1a1b26] "
set -g window-status-format         "#[fg=#565f89,bg=#24283b] #I  #W#{?window_zoomed_flag, 󰁌 ,} "
set -g window-status-current-format "#[fg=#c0caf5,bg=#292e42,bold] #I  #W#{?window_zoomed_flag, 󰁌 ,} "

# Pane borders
set -g pane-border-style        "fg=#24283b"
set -g pane-active-border-style "fg=#3d59a1"

# Right status — each module: icon + value on #24283b, separated by a gap
# Gap between modules: single space at status bg colour (#1a1b26)
set -g  status-right "#[fg=#f7768e,bg=#24283b]  #{pane_current_command} "
set -ag status-right "#[fg=#1a1b26,bg=#1a1b26] "
set -ag status-right "#[fg=#e0af68,bg=#24283b]  #{cpu_percentage} "
set -ag status-right "#[fg=#1a1b26,bg=#1a1b26] "
set -ag status-right "#[fg=#9ece6a,bg=#24283b]#{?client_prefix,#[fg=#f7768e],}  #S "
set -ag status-right "#[fg=#1a1b26,bg=#1a1b26] "
set -ag status-right "#[fg=#7aa2f7,bg=#24283b] 󰔟 #(uptime | sed 's/^[^,]*up *//; s/, *[[:digit:]]* user.*//; s/ day.*, */d /; s/ hr\\(s*\\).*/h/; s/ min\\(s*\\).*/m/; s/ sec\\(s*\\).*/s/; s/\\([0-9]\\{1,2\\}\\):\\([0-9]\\{1,2\\}\\)/\\1h \\2m/') "
set -ag status-right "#[fg=#1a1b26,bg=#1a1b26] "
set -ag status-right "#[fg=#bb9af7,bg=#24283b] #{battery_icon} #{battery_percentage} "

# Battery icons — Nerd Font glyphs to match the rest of the status bar
set -g @batt_icon_status_charging    '󰂄'
set -g @batt_icon_status_charged     '󰁹'
set -g @batt_icon_status_discharging '󰁹'
set -g @batt_icon_status_unknown     '󰂑'
set -g @batt_icon_status_attached    '󰂄'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
