# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-yank'

run-shell 'tmux set-option -g default-shell $(which zsh)'
run-shell 'tmux set-option -g default-command "exec $(which zsh) -l"'

# reload config file
bind r source-file ~/.tmux.conf

# Start windows and panes at 1, not 0
set -g base-index 1

# Key bindings
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# renumber windows automatically
# ex I have windows 1, 2, 3 and close 2 - I now have 1, 2 instead of 1, 3
set -g renumber-windows on

# split panes using | and - and open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# VI mode for tmux-yank (copy paste)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Cursor shape: vertical bar (line) instead of block
set -g cursor-style blinking-bar

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

# Sesh session switcher — replaces the default prefix+s tree view
bind s display-popup -E -w 40% -h 50% "sesh connect \"$(sesh list -i | fzf --no-sort --ansi --layout=reverse --height=100% --prompt '⚡  ' --bind 'ctrl-x:execute(tmux kill-session -t {2})+reload(sesh list -i)')\""

# ---------------------------------------------------------------------------
# Status bar — custom Blazer-matched theme
#
# Blazer palette used:
#   bg        #0d1926   surface   #152233   surface+  #263d55
#   fg        #d9e6f2   dim       #6082a0
#   app       #c48a8a   cpu       #b8b87a   session   #7ab87a
#   uptime    #7aaed4   battery   #bdbddb
# ---------------------------------------------------------------------------

set -g status-style "bg=#0d1926,fg=#d9e6f2"
set -g message-style "bg=#152233,fg=#d9e6f2"
set -g status-left-length 0
set -g status-right-length 120
set -g status-left ""

# Window tabs — rectangular blocks, gap between each is the bare status bg
set -g window-status-separator "#[bg=#0d1926] "
set -g window-status-format         "#[fg=#6082a0,bg=#152233] #I  #W#{?window_zoomed_flag, 󰁌 ,} "
set -g window-status-current-format "#[fg=#d9e6f2,bg=#263d55,bold] #I  #W#{?window_zoomed_flag, 󰁌 ,} "

# Pane borders
set -g pane-border-style        "fg=#152233"
set -g pane-active-border-style "fg=#3a5470"

# Right status — each module: icon + value on #152233, separated by a gap
# Gap between modules: single space at status bg colour (#0d1926)
set -g  status-right "#[fg=#c48a8a,bg=#152233]  #{pane_current_command} "
set -ag status-right "#[fg=#0d1926,bg=#0d1926] "
set -ag status-right "#[fg=#b8b87a,bg=#152233]  #{cpu_percentage} "
set -ag status-right "#[fg=#0d1926,bg=#0d1926] "
set -ag status-right "#[fg=#7ab87a,bg=#152233]#{?client_prefix,#[fg=#b87a7a],}  #S "
set -ag status-right "#[fg=#0d1926,bg=#0d1926] "
set -ag status-right "#[fg=#7aaed4,bg=#152233] 󰔟 #(uptime | sed 's/^[^,]*up *//; s/, *[[:digit:]]* user.*//; s/ day.*, */d /; s/ hr\\(s*\\).*/h/; s/ min\\(s*\\).*/m/; s/ sec\\(s*\\).*/s/; s/\\([0-9]\\{1,2\\}\\):\\([0-9]\\{1,2\\}\\)/\\1h \\2m/') "
set -ag status-right "#[fg=#0d1926,bg=#0d1926] "
set -ag status-right "#[fg=#bdbddb,bg=#152233] #{battery_icon} #{battery_percentage} "

# Battery icons — Nerd Font glyphs to match the rest of the status bar
set -g @batt_icon_status_charging    '󰂄'
set -g @batt_icon_status_charged     '󰁹'
set -g @batt_icon_status_discharging '󰁹'
set -g @batt_icon_status_unknown     '󰂑'
set -g @batt_icon_status_attached    '󰂄'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
