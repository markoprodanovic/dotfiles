# Sesh session configuration
# Each [[session]] entry appears in the sesh picker.
# startup_script runs after the session is created — use it to set up splits/windows.

[[session]]
name = "vek-moderne-arhitekture"
path = "~/Documents/Dev/vek-moderne-arhitekture"
startup_command = "bash ~/.config/sesh/scripts/vek-moderne-arhitekture.sh"

